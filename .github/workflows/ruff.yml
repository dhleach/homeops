name: Ruff Lint

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run ruff format check
        run: |
          ruff format --check --diff services/observer/observer.py services/consumer/consumer.py || true
      - name: Run ruff checks
        run: |
          ruff check services/observer/observer.py services/consumer/consumer.py
