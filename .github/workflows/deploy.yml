name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    name: Deploy to Pi
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Wait for Tailscale
        run: sleep 5

      - name: Write SSH key
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ${{ runner.temp }}/deploy_key
          chmod 600 ${{ runner.temp }}/deploy_key

      - name: Deploy to Pi
        run: |
          ssh -i ${{ runner.temp }}/deploy_key \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            github-deploy@100.115.21.72 \
            "cd /home/leachd/repos/homeops && git pull origin master && sudo systemctl restart homeops-observer && sudo systemctl restart homeops-consumer && echo 'Deploy complete'"
