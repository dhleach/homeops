# Nginx reverse proxy: api.homeops.now -> FastAPI (port 8000)
#
# HTTP block handles Let's Encrypt ACME challenges and redirects all
# other traffic to HTTPS. After running certbot, it will add the SSL
# server block automatically (or use the manual HTTPS block below).
#
# Deploy:
#   sudo cp api.homeops.now.conf /etc/nginx/sites-available/api.homeops.now
#   sudo ln -s /etc/nginx/sites-available/api.homeops.now /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.homeops.now

server {
    listen 80;
    listen [::]:80;
    server_name api.homeops.now;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.homeops.now;

    # Certificates managed by certbot - paths filled in after first certbot run
    ssl_certificate     /etc/letsencrypt/live/api.homeops.now/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.homeops.now/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # CORS - allow requests from homeops.now (CloudFront frontend)
    add_header Access-Control-Allow-Origin "https://homeops.now" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
