# Nginx reverse proxy for api.homeops.now
#
# Routes:
#   /grafana    -> Grafana on :3000  (served at sub-path via GF_SERVER_SERVE_FROM_SUB_PATH)
#   /prometheus -> Prometheus on :9090
#   /           -> FastAPI on :8000
#
# Deploy:
#   sudo cp api.homeops.now.conf /etc/nginx/sites-available/api.homeops.now
#   sudo ln -s /etc/nginx/sites-available/api.homeops.now /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.homeops.now

server {
    listen 80;
    listen [::]:80;
    server_name api.homeops.now;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.homeops.now;

    # Certificates managed by certbot
    ssl_certificate     /etc/letsencrypt/live/api.homeops.now/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.homeops.now/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # CORS for FastAPI - allow requests from homeops.now (CloudFront frontend)
    # Note: not applied to /grafana or /prometheus (handled by those apps)

    # --- Grafana (sub-path: /grafana) ---
    location /grafana/ {
        proxy_pass         http://localhost:3000/grafana/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Required for Grafana websocket live updates
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # Redirect bare /grafana to /grafana/
    location = /grafana {
        return 301 /grafana/;
    }

    # --- Prometheus (sub-path: /prometheus) ---
    # proxy_pass with trailing slash strips the /prometheus prefix before forwarding
    location /prometheus/ {
        proxy_pass         http://localhost:9090/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Redirect bare /prometheus to /prometheus/
    location = /prometheus {
        return 301 /prometheus/;
    }

    # --- FastAPI backend (everything else) ---
    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # CORS for frontend
        add_header Access-Control-Allow-Origin "https://homeops.now" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }
}
