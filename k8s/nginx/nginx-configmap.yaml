apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: default
data:
  api.homeops.now.conf: |
    server {
      listen 80;
      listen [::]:80;
      server_name api.homeops.now;

      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer-when-downgrade" always;

      location /grafana/ {
        proxy_pass http://100.75.59.106:3000/grafana/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
      }

      location = /grafana {
        return 301 /grafana/;
      }

      location /prometheus/ {
        proxy_pass http://100.75.59.106:9090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
      }

      location = /prometheus {
        return 301 /prometheus/;
      }

      location / {
        if ($request_method = 'OPTIONS') {
          add_header Access-Control-Allow-Origin "https://homeops.now";
          add_header Access-Control-Allow-Methods "GET, OPTIONS";
          add_header Access-Control-Allow-Headers "Content-Type, Authorization";
          add_header Access-Control-Max-Age 86400;
          add_header Content-Length 0;
          return 204;
        }
        proxy_pass http://100.75.59.106:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin "https://homeops.now" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
      }
    }