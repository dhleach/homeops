apiVersion apps/v1
kind: Deployment
metadata:
  name:nginx
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
    template:
      metadata:
        labels:
          app: nginx
      spec:
        hostNetwork: true
        nodeSelector:
          role:ec2
        containers:
         - name: nginx
           image: nginx:1.27-alpine
           ports:
            - containerPort: 80
            - containerPort: 443
           volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.data
            - name: letsencrypt
              mountPath: /etc/letsencrypt
              readOnly: true
        volumes:
         - name: nginx-config
           configMap:
            name: nginx-config
         - name: letsencrypt
           hostPath:
            path: /etc/letsencrypt
            type: Directory