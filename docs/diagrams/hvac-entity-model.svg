<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" font-family="Arial, Helvetica, sans-serif">
  <!-- Background -->
  <rect width="1000" height="640" fill="#0f1923" rx="8"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0" letter-spacing="0.5">HomeOps HVAC Physical Entity Model</text>
  <line x1="60" y1="50" x2="940" y2="50" stroke="#2d4a6b" stroke-width="1"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="a-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="a-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="a-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="a-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="a-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="a-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <!-- ==================== FURNACE ==================== -->
  <rect x="370" y="65" width="260" height="130" rx="8" fill="#2a1a1a" stroke="#ef4444" stroke-width="2"/>
  <text x="500" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#fca5a5">FURNACE</text>
  <text x="500" y="107" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Carrier binary unit — oversized for house</text>
  <line x1="385" y1="113" x2="615" y2="113" stroke="#3a2020" stroke-width="1"/>

  <!-- furnace properties -->
  <text x="390" y="131" font-size="10" fill="#94a3b8">● State:  ON / OFF (binary)</text>
  <text x="390" y="149" font-size="10" fill="#94a3b8">● Oversized relative to load</text>
  <text x="390" y="167" font-size="10" fill="#94a3b8">● High-limit switch (thermal cutoff)</text>
  <text x="390" y="183" font-size="10" fill="#fca5a5">⚠ Code 4  → overheating detected</text>

  <!-- ==================== DAMPER/ZONE CONTROLLER ==================== -->
  <rect x="370" y="230" width="260" height="60" rx="6" fill="#1a2535" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="500" y="256" text-anchor="middle" font-size="12" font-weight="bold" fill="#7dd3fc">Zone Damper Controller</text>
  <text x="500" y="276" text-anchor="middle" font-size="10" fill="#94a3b8">3 zones  ·  motorized dampers  ·  HA-connected</text>

  <!-- Furnace → Damper -->
  <line x1="500" y1="195" x2="500" y2="228" stroke="#ef4444" stroke-width="2" marker-end="url(#a-red)"/>
  <text x="515" y="215" font-size="9" fill="#ef4444">hot air</text>

  <!-- ==================== 3 ZONE BOXES ==================== -->
  <!-- Zone: Basement -->
  <rect x="40" y="355" width="200" height="100" rx="8" fill="#1a2a1a" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="140" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">Basement</text>
  <text x="140" y="394" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">zone not thermostat-controlled</text>
  <line x1="55" y1="400" x2="225" y2="400" stroke="#2d4a6b" stroke-width="1"/>
  <text x="140" y="418" text-anchor="middle" font-size="11" fill="#94a3b8">1 vent</text>
  <text x="140" y="436" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Always open</text>
  <text x="140" y="451" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">bypass / pressure relief</text>

  <!-- Zone: Floor 1 -->
  <rect x="280" y="355" width="200" height="100" rx="8" fill="#1a3a2a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="380" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#86efac">Floor 1</text>
  <text x="380" y="394" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Good vent coverage</text>
  <line x1="295" y1="400" x2="465" y2="400" stroke="#1e4a2e" stroke-width="1"/>
  <text x="380" y="418" text-anchor="middle" font-size="11" fill="#86efac">5 vents</text>
  <text x="380" y="436" text-anchor="middle" font-size="10" fill="#94a3b8">Thermostat: floor_1</text>
  <text x="380" y="451" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">Adequate capacity for zone load</text>

  <!-- Zone: Floor 2 — highlighted as problem zone -->
  <rect x="520" y="340" width="200" height="130" rx="8" fill="#3a1a1a" stroke="#ef4444" stroke-width="2.5"/>
  <text x="620" y="363" text-anchor="middle" font-size="12" font-weight="bold" fill="#fca5a5">Floor 2</text>
  <text x="620" y="378" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold">⚠ PROBLEM ZONE</text>
  <line x1="535" y1="385" x2="705" y2="385" stroke="#5a2020" stroke-width="1"/>
  <text x="620" y="403" text-anchor="middle" font-size="11" fill="#fca5a5">3 vents only</text>
  <text x="620" y="421" text-anchor="middle" font-size="10" fill="#94a3b8">Thermostat: floor_2</text>
  <text x="620" y="439" text-anchor="middle" font-size="10" fill="#fca5a5">Extended call → furnace</text>
  <text x="620" y="455" text-anchor="middle" font-size="10" fill="#fca5a5">blasts through 3 vents</text>
  <text x="620" y="468" text-anchor="middle" font-size="9" fill="#ef4444" font-style="italic">→ overheating risk</text>

  <!-- Zone: Floor 3 -->
  <rect x="760" y="355" width="200" height="100" rx="8" fill="#1a3a2a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="860" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#86efac">Floor 3</text>
  <text x="860" y="394" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Largest vent coverage</text>
  <line x1="775" y1="400" x2="945" y2="400" stroke="#1e4a2e" stroke-width="1"/>
  <text x="860" y="418" text-anchor="middle" font-size="11" fill="#86efac">7 vents</text>
  <text x="860" y="436" text-anchor="middle" font-size="10" fill="#94a3b8">Thermostat: floor_3</text>
  <text x="860" y="451" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">Best heat distribution</text>

  <!-- Damper → Zones -->
  <path d="M 400 290 L 400 320 L 140 320 L 140 353" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#a-gray)"/>
  <path d="M 460 290 L 460 330 L 380 330 L 380 353" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-green)"/>
  <path d="M 530 290 L 530 320 L 620 320 L 620 338" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#a-red)"/>
  <path d="M 590 290 L 590 320 L 860 320 L 860 353" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-green)"/>

  <!-- Damper labels -->
  <text x="140" y="318" text-anchor="middle" font-size="9" fill="#94a3b8">always open</text>
  <text x="380" y="328" text-anchor="middle" font-size="9" fill="#22c55e">damper</text>
  <text x="625" y="318" text-anchor="middle" font-size="9" fill="#ef4444">damper</text>
  <text x="860" y="318" text-anchor="middle" font-size="9" fill="#22c55e">damper</text>

  <!-- ==================== FAILURE MODE CHAIN ==================== -->
  <rect x="40" y="500" width="920" height="120" rx="8" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="500" y="523" text-anchor="middle" font-size="13" font-weight="bold" fill="#fca5a5">Critical Failure Mode — Floor 2 Extended Call</text>
  <line x1="60" y1="530" x2="940" y2="530" stroke="#3a1020" stroke-width="1"/>

  <!-- Failure chain -->
  <rect x="60" y="540" width="130" height="45" rx="4" fill="#3a1a1a" stroke="#ef4444" stroke-width="1"/>
  <text x="125" y="561" text-anchor="middle" font-size="9" fill="#fca5a5">Floor 2 calls</text>
  <text x="125" y="576" text-anchor="middle" font-size="9" fill="#fca5a5">for heat ≥45 min</text>

  <line x1="190" y1="562" x2="215" y2="562" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a-red)"/>

  <rect x="215" y="540" width="145" height="45" rx="4" fill="#3a1a1a" stroke="#ef4444" stroke-width="1"/>
  <text x="287" y="557" text-anchor="middle" font-size="9" fill="#fca5a5">Furnace runs through</text>
  <text x="287" y="571" text-anchor="middle" font-size="9" fill="#fca5a5">only 3 open vents</text>
  <text x="287" y="581" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">(other zones closed)</text>

  <line x1="360" y1="562" x2="385" y2="562" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a-red)"/>

  <rect x="385" y="540" width="130" height="45" rx="4" fill="#3a1a1a" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="561" text-anchor="middle" font-size="9" fill="#fca5a5">Plenum overheats</text>
  <text x="450" y="576" text-anchor="middle" font-size="9" fill="#fca5a5">Code 4 trips</text>

  <line x1="515" y1="562" x2="540" y2="562" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a-red)"/>

  <rect x="540" y="540" width="140" height="45" rx="4" fill="#3a1a1a" stroke="#f97316" stroke-width="1"/>
  <text x="610" y="557" text-anchor="middle" font-size="9" fill="#fdba74">High-limit switch</text>
  <text x="610" y="571" text-anchor="middle" font-size="9" fill="#fdba74">cuts furnace</text>
  <text x="610" y="581" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Code 7 lockout starts</text>

  <line x1="680" y1="562" x2="705" y2="562" stroke="#f97316" stroke-width="1.5" marker-end="url(#a-orange)"/>

  <rect x="705" y="540" width="130" height="45" rx="4" fill="#2a1a0a" stroke="#f59e0b" stroke-width="1"/>
  <text x="770" y="557" text-anchor="middle" font-size="9" fill="#fde68a">3-hour lockout</text>
  <text x="770" y="571" text-anchor="middle" font-size="9" fill="#fde68a">Code 7 fault</text>
  <text x="770" y="581" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">No heat until reset</text>

  <line x1="835" y1="562" x2="860" y2="562" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a-amber)"/>

  <rect x="860" y="540" width="100" height="45" rx="4" fill="#0d1f3a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="910" y="557" text-anchor="middle" font-size="9" fill="#86efac">homeops</text>
  <text x="910" y="571" text-anchor="middle" font-size="9" fill="#86efac">PREVENTS</text>
  <text x="910" y="581" text-anchor="middle" font-size="8" fill="#22c55e" font-style="italic">this →</text>

  <!-- ==================== VENT SUMMARY ==================== -->
  <text x="500" y="310" text-anchor="middle" font-size="11" fill="#64748b">16 total vents  ·  1 basement (always open)  ·  5 floor 1  ·  3 floor 2  ·  7 floor 3</text>
</svg>
