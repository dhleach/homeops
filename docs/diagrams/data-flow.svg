<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" font-family="Arial, Helvetica, sans-serif">
  <!-- Background -->
  <rect width="1000" height="620" fill="#0f1923" rx="8"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0" letter-spacing="0.5">HomeOps Event Lifecycle &amp; Data Flow</text>
  <line x1="60" y1="50" x2="940" y2="50" stroke="#2d4a6b" stroke-width="1"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- ==================== COLUMN 1: HA SENSORS ==================== -->
  <rect x="40" y="65" width="170" height="205" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="125" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#93c5fd">HA Sensor Readings</text>
  <line x1="60" y1="94" x2="190" y2="94" stroke="#2d4a6b" stroke-width="1"/>
  <text x="125" y="113" text-anchor="middle" font-size="10" fill="#94a3b8">binary_sensor.*_heating_call</text>
  <text x="125" y="131" text-anchor="middle" font-size="10" fill="#94a3b8">climate.*_thermostat</text>
  <text x="125" y="149" text-anchor="middle" font-size="10" fill="#94a3b8">binary_sensor.furnace_running</text>
  <text x="125" y="167" text-anchor="middle" font-size="10" fill="#94a3b8">sensor.outdoor_temperature</text>
  <text x="125" y="185" text-anchor="middle" font-size="10" fill="#94a3b8">binary_sensor.floor_1/2/3</text>
  <text x="125" y="207" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Polled via HA</text>
  <text x="125" y="223" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">State API every 30s</text>
  <text x="125" y="242" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">+ WebSocket sub</text>
  <text x="125" y="260" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">for state_changed</text>

  <!-- ==================== COLUMN 2: OBSERVER ==================== -->
  <rect x="250" y="65" width="150" height="70" rx="8" fill="#1a3a2a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="325" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#86efac">observer.py</text>
  <text x="325" y="110" text-anchor="middle" font-size="10" fill="#94a3b8">Routes by entity_id</text>
  <text x="325" y="126" text-anchor="middle" font-size="10" fill="#94a3b8">Writes raw JSONL events</text>

  <!-- ==================== COLUMN 3: EVENTS.JSONL ==================== -->
  <rect x="250" y="185" width="150" height="230" rx="8" fill="#0d1f2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="325" y="207" text-anchor="middle" font-size="11" font-weight="bold" fill="#7dd3fc">events.jsonl</text>
  <text x="325" y="222" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">raw events · append-only</text>
  <line x1="265" y1="228" x2="385" y2="228" stroke="#1e3a5f" stroke-width="1"/>

  <rect x="262" y="234" width="126" height="18" rx="3" fill="#1a3a2a" stroke="#22c55e" stroke-width="0.75"/>
  <text x="325" y="247" text-anchor="middle" font-size="9" fill="#86efac">zone_temp_snapshot.v1</text>

  <rect x="262" y="256" width="126" height="18" rx="3" fill="#1a3a2a" stroke="#22c55e" stroke-width="0.75"/>
  <text x="325" y="269" text-anchor="middle" font-size="9" fill="#86efac">heating_short_session.v1</text>

  <rect x="262" y="278" width="126" height="18" rx="3" fill="#1a3a2a" stroke="#22c55e" stroke-width="0.75"/>
  <text x="325" y="291" text-anchor="middle" font-size="9" fill="#86efac">heating_long_session.v1</text>

  <rect x="262" y="300" width="126" height="18" rx="3" fill="#1a3a2a" stroke="#22c55e" stroke-width="0.75"/>
  <text x="325" y="313" text-anchor="middle" font-size="9" fill="#86efac">zone_setpoint_miss.v1</text>

  <rect x="262" y="322" width="126" height="18" rx="3" fill="#1a3a2a" stroke="#22c55e" stroke-width="0.75"/>
  <text x="325" y="335" text-anchor="middle" font-size="9" fill="#86efac">zone_slow_to_heat.v1</text>

  <rect x="262" y="344" width="126" height="18" rx="3" fill="#1a3a2a" stroke="#22c55e" stroke-width="0.75"/>
  <text x="325" y="357" text-anchor="middle" font-size="9" fill="#86efac">observer_silence.v1</text>

  <rect x="262" y="366" width="126" height="18" rx="3" fill="#1a3a2a" stroke="#22c55e" stroke-width="0.75"/>
  <text x="325" y="379" text-anchor="middle" font-size="9" fill="#86efac">floor_not_responding.v1</text>

  <!-- ==================== COLUMN 4: CONSUMER ==================== -->
  <rect x="450" y="65" width="170" height="205" rx="8" fill="#2a1a3a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="535" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#d8b4fe">consumer.py</text>
  <line x1="470" y1="94" x2="600" y2="94" stroke="#3b1f5e" stroke-width="1"/>
  <text x="535" y="113" text-anchor="middle" font-size="11" fill="#94a3b8">Rules Engine</text>

  <rect x="465" y="120" width="140" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="535" y="133" text-anchor="middle" font-size="9" fill="#c4b5fd">floor call session tracker</text>

  <rect x="465" y="142" width="140" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="535" y="155" text-anchor="middle" font-size="9" fill="#c4b5fd">furnace session tracker</text>

  <rect x="465" y="164" width="140" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="535" y="177" text-anchor="middle" font-size="9" fill="#c4b5fd">thermostat state tracker</text>

  <rect x="465" y="186" width="140" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="535" y="199" text-anchor="middle" font-size="9" fill="#c4b5fd">zone heating performance</text>

  <rect x="465" y="208" width="140" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="535" y="221" text-anchor="middle" font-size="9" fill="#c4b5fd">floor-2 overheating guard</text>

  <rect x="465" y="230" width="140" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="535" y="243" text-anchor="middle" font-size="9" fill="#c4b5fd">silence watchdog timer</text>

  <text x="535" y="262" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">Timeout-driven loop</text>

  <!-- ==================== COLUMN 5: DERIVED EVENTS ==================== -->
  <rect x="672" y="65" width="150" height="230" rx="8" fill="#0d1f2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="747" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#7dd3fc">events.jsonl</text>
  <text x="747" y="102" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">schema-versioned events</text>
  <line x1="687" y1="108" x2="807" y2="108" stroke="#1e3a5f" stroke-width="1"/>

  <rect x="684" y="114" width="126" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="747" y="127" text-anchor="middle" font-size="9" fill="#c4b5fd">floor_call_started/ended.v1</text>

  <rect x="684" y="136" width="126" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="747" y="149" text-anchor="middle" font-size="9" fill="#c4b5fd">heating_session_*.v1</text>

  <rect x="684" y="158" width="126" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="747" y="171" text-anchor="middle" font-size="9" fill="#c4b5fd">thermostat_setpoint_*.v1</text>

  <rect x="684" y="180" width="126" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="747" y="193" text-anchor="middle" font-size="9" fill="#c4b5fd">zone_time_to_temp.v1</text>

  <rect x="684" y="202" width="126" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="747" y="215" text-anchor="middle" font-size="9" fill="#c4b5fd">zone_overshoot/undershoot.v1</text>

  <rect x="684" y="224" width="126" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="747" y="237" text-anchor="middle" font-size="9" fill="#c4b5fd">floor_2_long_call_warning.v1</text>

  <rect x="684" y="246" width="126" height="18" rx="3" fill="#1a1030" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="747" y="259" text-anchor="middle" font-size="9" fill="#c4b5fd">furnace_daily_summary.v1</text>

  <!-- ==================== COLUMN 6: TELEGRAM ==================== -->
  <rect x="872" y="65" width="100" height="130" rx="8" fill="#1a2535" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="922" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#7dd3fc">Telegram</text>
  <text x="922" y="109" text-anchor="middle" font-size="10" font-weight="bold" fill="#7dd3fc">Alerts</text>
  <line x1="887" y1="116" x2="957" y2="116" stroke="#2d4a6b" stroke-width="1"/>
  <text x="922" y="133" text-anchor="middle" font-size="9" fill="#94a3b8">floor-2</text>
  <text x="922" y="149" text-anchor="middle" font-size="9" fill="#94a3b8">overheating</text>
  <text x="922" y="165" text-anchor="middle" font-size="9" fill="#94a3b8">warning</text>
  <text x="922" y="181" text-anchor="middle" font-size="9" fill="#94a3b8">push alert</text>

  <!-- ==================== ARROWS ==================== -->
  <!-- HA → Observer -->
  <line x1="210" y1="100" x2="248" y2="100" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Observer → events.jsonl -->
  <line x1="325" y1="135" x2="325" y2="183" stroke="#38bdf8" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- events.jsonl → Consumer -->
  <line x1="400" y1="168" x2="448" y2="168" stroke="#a855f7" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="424" y="163" text-anchor="middle" font-size="9" fill="#a855f7">tail</text>

  <!-- Consumer → events.jsonl -->
  <line x1="620" y1="168" x2="670" y2="168" stroke="#38bdf8" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- derived_events → Telegram (long call warning) -->
  <line x1="822" y1="130" x2="870" y2="130" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="846" y="124" text-anchor="middle" font-size="9" fill="#ef4444">alert!</text>

  <!-- ==================== ESCALATION SECTION ==================== -->
  <rect x="40" y="435" width="920" height="165" rx="8" fill="#0d1520" stroke="#2d4a6b" stroke-width="1.5"/>
  <text x="500" y="458" text-anchor="middle" font-size="13" font-weight="bold" fill="#e2e8f0">Floor 2 Overheating — Event Chain</text>
  <line x1="60" y1="465" x2="940" y2="465" stroke="#2d4a6b" stroke-width="1"/>

  <!-- Chain boxes -->
  <rect x="60" y="477" width="130" height="50" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="125" y="499" text-anchor="middle" font-size="10" fill="#93c5fd">floor_2 heating</text>
  <text x="125" y="515" text-anchor="middle" font-size="10" fill="#93c5fd">call starts</text>

  <rect x="220" y="477" width="130" height="50" rx="5" fill="#1a3a2a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="285" y="493" text-anchor="middle" font-size="10" fill="#86efac">floor_call_</text>
  <text x="285" y="508" text-anchor="middle" font-size="10" fill="#86efac">started.v1</text>
  <text x="285" y="523" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">emitted</text>

  <rect x="380" y="477" width="140" height="50" rx="5" fill="#2a1a3a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="450" y="493" text-anchor="middle" font-size="10" fill="#c4b5fd">consumer tracks</text>
  <text x="450" y="508" text-anchor="middle" font-size="10" fill="#c4b5fd">elapsed_s counter</text>
  <text x="450" y="523" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">timeout-driven loop</text>

  <rect x="550" y="477" width="150" height="50" rx="5" fill="#3a1a1a" stroke="#ef4444" stroke-width="1.2"/>
  <text x="625" y="493" text-anchor="middle" font-size="10" fill="#fca5a5">floor_2_long_call</text>
  <text x="625" y="508" text-anchor="middle" font-size="10" fill="#fca5a5">_warning.v1</text>
  <text x="625" y="523" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">at threshold (45 min default)</text>

  <rect x="730" y="477" width="190" height="50" rx="5" fill="#1a2535" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="825" y="493" text-anchor="middle" font-size="10" fill="#7dd3fc">Telegram push alert</text>
  <text x="825" y="508" text-anchor="middle" font-size="10" fill="#7dd3fc">"Floor 2 heating ≥45m"</text>
  <text x="825" y="523" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">before furnace overheats</text>

  <!-- chain arrows -->
  <line x1="190" y1="502" x2="218" y2="502" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="350" y1="502" x2="378" y2="502" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="520" y1="502" x2="548" y2="502" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="700" y1="502" x2="728" y2="502" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- second row: what it prevents -->
  <text x="500" y="560" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Prevents: furnace trips high-limit switch (Code 4) → 3-hour lockout (Code 7) → cold house</text>
  <text x="500" y="578" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Root cause: Floor 2 has only 3 vents — extended call forces furnace to blast through too few open vents</text>
</svg>
