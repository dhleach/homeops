[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort import sorting
  "UP",  # pyupgrade
]

[tool.ruff.lint.isort]
known-first-party = [
  "alerts",
  "constants",
  "hvac_context",
  "processors",
  "reporting",
  "state",
  "telegram_commands",
  "utils",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
